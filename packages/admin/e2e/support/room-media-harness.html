<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EdgeBase Room Media Harness</title>
    <script type="importmap">
      {
        "imports": {
          "@edge-base/shared": "/packages/shared/dist/index.js",
          "@edge-base/core": "/packages/sdk/js/packages/web/node_modules/@edge-base/core/dist/index.js"
        }
      }
    </script>
    <script src="/packages/sdk/js/packages/web/node_modules/@cloudflare/realtimekit/dist/browser.js"></script>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        margin: 24px;
        color: #111827;
      }
      pre {
        background: #f3f4f6;
        border-radius: 8px;
        padding: 12px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Room Media Harness</h1>
    <p id="status">idle</p>
    <pre id="log"></pre>
    <script type="module">
      import { createClient } from '/packages/sdk/js/packages/web/dist/index.js';

      const state = {
        client: null,
        room: null,
        transport: null,
        meeting: null,
        status: 'idle',
        events: [],
        remoteTracks: [],
        failures: [],
        subscriptions: [],
        syntheticCleanups: [],
        syntheticRestore: null,
      };

      const logEl = document.getElementById('log');
      const statusEl = document.getElementById('status');

      function setStatus(value) {
        state.status = value;
        statusEl.textContent = value;
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function appendLog(entry) {
        state.events.push(entry);
        logEl.textContent = JSON.stringify(state.events, null, 2);
      }

      function stringifyError(error) {
        if (!error) return 'Unknown room media error';
        if (typeof error === 'string') return error;
        if (typeof error.message === 'string') return error.message;
        return JSON.stringify(error);
      }

      function cleanupSyntheticMedia() {
        const restore = state.syntheticRestore;
        state.syntheticRestore = null;
        if (typeof restore === 'function') {
          try {
            restore();
          } catch {}
        }

        for (const cleanup of state.syntheticCleanups.splice(0)) {
          try {
            cleanup();
          } catch {}
        }
      }

      function createSyntheticVideoTrack(label = 'camera', width = 640, height = 360, frameRate = 15) {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext('2d');
        if (!context || typeof canvas.captureStream !== 'function') {
          throw new Error('Synthetic video capture is not supported in this browser.');
        }

        let frame = 0;
        const draw = () => {
          context.fillStyle = '#0f172a';
          context.fillRect(0, 0, width, height);
          context.fillStyle = '#38bdf8';
          context.fillRect(24, 24, width - 48, height - 48);
          context.fillStyle = '#111827';
          context.font = 'bold 28px sans-serif';
          context.fillText(label, 32, 52);
          context.font = '20px monospace';
          context.fillText(`frame:${frame}`, 32, 88);
          context.fillText(new Date().toISOString().slice(11, 19), 32, 118);
        };

        draw();
        const interval = globalThis.setInterval(() => {
          frame += 1;
          draw();
        }, 100);
        const stream = canvas.captureStream(frameRate);
        const track = stream.getVideoTracks()[0];
        if (!track) {
          clearInterval(interval);
          throw new Error('Synthetic video track could not be created.');
        }

        state.syntheticCleanups.push(() => {
          clearInterval(interval);
          stream.getTracks().forEach((entry) => entry.stop());
        });

        return track;
      }

      function createSyntheticAudioTrack() {
        const AudioContextCtor = globalThis.AudioContext || globalThis.webkitAudioContext;
        if (!AudioContextCtor) {
          throw new Error('Synthetic audio capture is not supported in this browser.');
        }

        const audioContext = new AudioContextCtor();
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const destination = audioContext.createMediaStreamDestination();

        oscillator.type = 'sine';
        oscillator.frequency.value = 440;
        gain.gain.value = 0.03;
        oscillator.connect(gain);
        gain.connect(destination);
        oscillator.start();

        const track = destination.stream.getAudioTracks()[0];
        if (!track) {
          oscillator.stop();
          void audioContext.close();
          throw new Error('Synthetic audio track could not be created.');
        }

        state.syntheticCleanups.push(() => {
          try {
            oscillator.stop();
          } catch {}
          destination.stream.getTracks().forEach((entry) => entry.stop());
          void audioContext.close().catch(() => {});
        });

        return track;
      }

      function createSyntheticMediaDevices() {
        return {
          async getUserMedia(constraints = {}) {
            const tracks = [];
            if (constraints.audio) {
              tracks.push(createSyntheticAudioTrack());
            }
            if (constraints.video) {
              tracks.push(createSyntheticVideoTrack('camera'));
            }
            return new MediaStream(tracks);
          },
          async getDisplayMedia(constraints = {}) {
            const tracks = [];
            if (constraints.video !== false) {
              tracks.push(createSyntheticVideoTrack('screen'));
            }
            if (constraints.audio) {
              tracks.push(createSyntheticAudioTrack());
            }
            return new MediaStream(tracks);
          },
          async enumerateDevices() {
            return [];
          },
        };
      }

      function installSyntheticMediaOverrides(syntheticMediaDevices) {
        const mediaDevices = navigator.mediaDevices;
        if (!mediaDevices) {
          return;
        }

        const originalGetUserMedia = typeof mediaDevices.getUserMedia === 'function'
          ? mediaDevices.getUserMedia.bind(mediaDevices)
          : undefined;
        const originalGetDisplayMedia = typeof mediaDevices.getDisplayMedia === 'function'
          ? mediaDevices.getDisplayMedia.bind(mediaDevices)
          : undefined;
        const originalEnumerateDevices = typeof mediaDevices.enumerateDevices === 'function'
          ? mediaDevices.enumerateDevices.bind(mediaDevices)
          : undefined;

        mediaDevices.getUserMedia = syntheticMediaDevices.getUserMedia.bind(syntheticMediaDevices);
        mediaDevices.getDisplayMedia = syntheticMediaDevices.getDisplayMedia.bind(syntheticMediaDevices);
        mediaDevices.enumerateDevices = syntheticMediaDevices.enumerateDevices.bind(syntheticMediaDevices);

        state.syntheticRestore = () => {
          if (originalGetUserMedia) {
            mediaDevices.getUserMedia = originalGetUserMedia;
          }
          if (originalGetDisplayMedia) {
            mediaDevices.getDisplayMedia = originalGetDisplayMedia;
          }
          if (originalEnumerateDevices) {
            mediaDevices.enumerateDevices = originalEnumerateDevices;
          }
        };
      }

      async function signUpOrSignIn(client, email, password) {
        try {
          return await client.auth.signUp({ email, password });
        } catch (error) {
          const message = stringifyError(error);
          if (!/already|duplicate|409/i.test(message)) {
            throw error;
          }
          return client.auth.signIn({ email, password });
        }
      }

      function waitFor(predicate, timeoutMs, label) {
        const startedAt = Date.now();

        return new Promise((resolve, reject) => {
          const tick = () => {
            const match = predicate();
            if (match) {
              resolve(match);
              return;
            }
            if (Date.now() - startedAt >= timeoutMs) {
              reject(new Error(`Timed out waiting for ${label}`));
              return;
            }
            setTimeout(tick, 100);
          };
          tick();
        });
      }

      function attachP2PPeerDebug() {
        const pc = state.transport?.getPeerConnection?.();
        if (!pc || pc.__edgebaseDebugAttached) {
          return;
        }
        pc.__edgebaseDebugAttached = true;
        pc.addEventListener?.('connectionstatechange', () => {
          appendLog({ type: 'p2p-connection-state', connectionState: pc.connectionState });
        });
        pc.addEventListener?.('iceconnectionstatechange', () => {
          appendLog({ type: 'p2p-ice-state', iceConnectionState: pc.iceConnectionState });
        });
        pc.addEventListener?.('signalingstatechange', () => {
          appendLog({ type: 'p2p-signaling-state', signalingState: pc.signalingState });
        });
      }

      function attachCloudflareMeetingDebug(meeting) {
        if (!meeting || meeting.__edgebaseDebugAttached) {
          return;
        }
        meeting.__edgebaseDebugAttached = true;
        const joined = meeting.participants?.joined;
        const active = meeting.participants?.active;

        appendLog({
          type: 'cloudflare-meeting-ready',
          selfId: meeting.self?.id ?? null,
          joinedCount: joined?.size ?? null,
          activeCount: active?.size ?? null,
        });

        const attachMap = (label, map) => {
          if (!map?.on) return;
          map.on('participantJoined', (participant) => {
            appendLog({ type: `${label}-participant-joined`, participantId: participant.id });
          });
          map.on('participantLeft', (participant) => {
            appendLog({ type: `${label}-participant-left`, participantId: participant.id });
          });
          map.on('participantsUpdate', () => {
            appendLog({ type: `${label}-participants-update`, size: map.size ?? null });
          });
        };

        attachMap('cloudflare-joined', joined);
        attachMap('cloudflare-active', active);

        meeting.self?.on?.('audioUpdate', ({ audioEnabled, audioTrack }) => {
          appendLog({
            type: 'cloudflare-self-audio',
            audioEnabled,
            trackId: audioTrack?.id ?? null,
          });
        });
      }

      window.edgebaseRoomMediaHarness = {
        async start({ baseUrl, namespace, roomId, provider, email, password, mediaMode = 'browser' }) {
          setStatus('starting');
          cleanupSyntheticMedia();
          const client = createClient(baseUrl);
          await signUpOrSignIn(client, email, password);

          const room = client.room(namespace, roomId);
          const syntheticMediaDevices = mediaMode === 'synthetic' ? createSyntheticMediaDevices() : null;
          if (syntheticMediaDevices) {
            installSyntheticMediaOverrides(syntheticMediaDevices);
          }
          const transportOptions = provider === 'cloudflare_realtimekit'
            ? {
                provider,
                cloudflareRealtimeKit: {
                  ...(syntheticMediaDevices ? { mediaDevices: syntheticMediaDevices } : {}),
                  clientFactory: {
                    init: async (options) => {
                      const meeting = await window.RealtimeKitClient.init(options);
                      state.meeting = meeting;
                      attachCloudflareMeetingDebug(meeting);
                      return meeting;
                    },
                  },
                },
              }
            : {
                provider,
                ...(syntheticMediaDevices ? { p2p: { mediaDevices: syntheticMediaDevices } } : {}),
              };
          const transport = room.media.transport(transportOptions);

          state.client = client;
          state.room = room;
          state.transport = transport;
          state.meeting = null;
          state.remoteTracks = [];
          state.failures = [];

          state.subscriptions.forEach((subscription) => subscription.unsubscribe());
          state.subscriptions = [];

          state.subscriptions.push(
            room.signals.onAny((event, payload, meta) => {
              appendLog({
                type: 'signal',
                event,
                payload,
                meta,
              });
            }),
          );

          state.subscriptions.push(
            room.session.onError((error) => {
              state.failures.push({ type: 'room-error', error });
              appendLog({ type: 'room-error', error });
            }),
          );

          state.subscriptions.push(
            room.session.onConnectionStateChange((connectionState) => {
              appendLog({ type: 'connection-state', state: connectionState });
            }),
          );

          state.subscriptions.push(
            room.session.onReconnect((info) => {
              appendLog({ type: 'reconnect', attempt: info.attempt });
            }),
          );

          state.subscriptions.push(
            room.media.onTrack((track, member) => {
              appendLog({
                type: 'room-track',
                kind: track.kind,
                trackId: track.trackId ?? null,
                memberId: member.memberId,
              });
            }),
          );

          state.subscriptions.push(
            room.media.onStateChange((member, mediaState) => {
              appendLog({
                type: 'room-state',
                memberId: member.memberId,
                mediaState,
              });
            }),
          );

          state.subscriptions.push(
            transport.onRemoteTrack((event) => {
              const payload = {
                type: 'remote-track',
                kind: event.kind,
                trackId: event.track.id,
                participantId: event.participantId ?? null,
                customParticipantId: event.customParticipantId ?? null,
                userId: event.userId ?? null,
              };
              state.remoteTracks.push(payload);
              appendLog(payload);
            }),
          );

          await room.join();
          await waitFor(() => room.members.current(), 10000, 'current room member');
          const sessionId = await transport.connect();
          attachP2PPeerDebug();
          setStatus('connected');
          appendLog({ type: 'connected', provider, sessionId });
          return { sessionId };
        },

        async enableAudio(constraints) {
          if (!state.transport) {
            throw new Error('transport not initialized');
          }
          const track = await state.transport.enableAudio(constraints ?? true);
          attachP2PPeerDebug();
          if (state.meeting) {
            appendLog({
              type: 'cloudflare-meeting-state',
              joinedCount: state.meeting.participants?.joined?.size ?? null,
              activeCount: state.meeting.participants?.active?.size ?? null,
            });
          }
          appendLog({ type: 'local-audio-enabled', trackId: track.id, kind: track.kind });
          return { id: track.id, kind: track.kind };
        },

        async enableVideo(constraints) {
          if (!state.transport) {
            throw new Error('transport not initialized');
          }
          const track = await state.transport.enableVideo(constraints ?? true);
          attachP2PPeerDebug();
          if (state.meeting) {
            appendLog({
              type: 'cloudflare-meeting-state',
              joinedCount: state.meeting.participants?.joined?.size ?? null,
              activeCount: state.meeting.participants?.active?.size ?? null,
            });
          }
          appendLog({ type: 'local-video-enabled', trackId: track.id, kind: track.kind });
          return { id: track.id, kind: track.kind };
        },

        async startScreenShare(constraints) {
          if (!state.transport) {
            throw new Error('transport not initialized');
          }
          const track = await state.transport.startScreenShare(constraints ?? { video: true, audio: false });
          appendLog({ type: 'local-screen-enabled', trackId: track.id, kind: 'screen' });
          return { id: track.id, kind: 'screen' };
        },

        async waitForRemoteTrack(kind = 'audio', timeoutMs = 20000) {
          return waitFor(
            () => state.remoteTracks.find((entry) => entry.kind === kind) ?? null,
            timeoutMs,
            `remote ${kind} track`,
          );
        },

        async waitForRemoteTrackCount(kind = 'audio', count = 1, timeoutMs = 20000) {
          return waitFor(
            () => {
              const matches = state.remoteTracks.filter((entry) => entry.kind === kind);
              return matches.length >= count ? matches : null;
            },
            timeoutMs,
            `${count} remote ${kind} tracks`,
          );
        },

        async waitForConnectionState(nextState, timeoutMs = 20000, afterEventCount = 0) {
          return waitFor(
            () => {
              const matches = state.events.filter((entry) => entry.type === 'connection-state');
              return matches.slice(afterEventCount).find((entry) => entry.state === nextState) ?? null;
            },
            timeoutMs,
            `connection state ${nextState}`,
          );
        },

        getConnectionStateEventCount() {
          return state.events.filter((entry) => entry.type === 'connection-state').length;
        },

        getSnapshot() {
          return {
            status: state.status,
            events: clone(state.events),
            remoteTracks: clone(state.remoteTracks),
            failures: clone(state.failures),
          };
        },

        async cleanup() {
          setStatus('cleaning-up');

          try {
            await state.transport?.disableAudio?.();
          } catch {}

          try {
            await state.transport?.disableVideo?.();
          } catch {}

          try {
            state.transport?.destroy?.();
          } catch {}

          try {
            state.room?.leave?.();
          } catch {}

          try {
            await state.client?.auth?.signOut?.();
          } catch {}

          state.subscriptions.forEach((subscription) => subscription.unsubscribe());
          state.subscriptions = [];
          state.transport = null;
          state.room = null;
          state.client = null;
          cleanupSyntheticMedia();
          setStatus('idle');
        },
      };
    </script>
  </body>
</html>
