[package]
name = "edgebase-sdk"
version = "0.2.5"
description = "Workspace release line for the EdgeBase Rust SDKs"
edition = "2021"
license = "MIT"
readme = "README.md"
homepage = "https://github.com/edge-base/edgebase/tree/main/packages/sdk/rust"
repository = "https://github.com/edge-base/edgebase"
publish = false
# Workspace root package — provides integration test targets (tests/e2e.rs, tests/e2e_room.rs)

[workspace]
members = ["packages/core", "packages/admin"]
resolver = "2"

[dev-dependencies]
edgebase = { package = "edgebase-admin", path = "packages/admin" }
edgebase_core = { package = "edgebase-core", path = "packages/core" }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
base64 = "0.22"
reqwest = { version = "0.12", features = ["json"] }
