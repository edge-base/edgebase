[package]
name = "edgebase-core"
version = "0.2.6"
edition = "2021"
description = "EdgeBase Core — shared types and HTTP client"
license = "MIT"
readme = "README.md"
homepage = "https://github.com/edge-base/edgebase/tree/main/packages/sdk/rust/packages/core"
repository = "https://github.com/edge-base/edgebase"
documentation = "https://edgebase.fun/docs/database/client-sdk"

[dependencies]
reqwest = { version = "0.12", features = ["json", "multipart"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
thiserror = "1"
base64 = "0.22"
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures-util = "0.3"
anyhow = "1"
urlencoding = "2"
uuid = { version = "1", features = ["v4"] }
