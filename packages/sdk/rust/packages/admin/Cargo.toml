[package]
name = "edgebase-admin"
version = "0.2.1"
edition = "2021"
description = "EdgeBase Admin SDK — server-side admin operations"
license = "MIT"
readme = "README.md"
homepage = "https://github.com/edge-base/edgebase/tree/main/packages/sdk/rust/packages/admin"
repository = "https://github.com/edge-base/edgebase"
documentation = "https://edgebase.fun/docs/admin-sdk/reference"

[dependencies]
edgebase-core = { version = "0.2.1", path = "../core" }
reqwest = { version = "0.12", features = ["json", "multipart"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
thiserror = "1"
urlencoding = "2"
