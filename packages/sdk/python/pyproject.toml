[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "edgebase"
version = "0.1.2"
description = "Python SDK for EdgeBase — Backend as a Service"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "EdgeBase Team" }
]

dependencies = [
    "httpx>=0.27",
    "websockets>=12.0",
]

[project.optional-dependencies]
keyring = ["keyring>=25.0"]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.sdist]
include = ["src/edgebase"]

[tool.hatch.build.targets.wheel]
packages = ["src/edgebase"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100
