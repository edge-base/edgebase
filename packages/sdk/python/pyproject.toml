[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "edgebase"
version = "0.2.8"
description = "Unified Python SDK for trusted EdgeBase server environments"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "EdgeBase Team" }
]

dependencies = [
    "edgebase-core>=0.2.8,<0.3.0",
    "edgebase-admin>=0.2.8,<0.3.0",
    "httpx>=0.27",
    "websockets>=12.0",
]

[project.urls]
Homepage = "https://github.com/edge-base/edgebase/tree/main/packages/sdk/python"
Repository = "https://github.com/edge-base/edgebase/tree/main/packages/sdk/python"
Documentation = "https://edgebase.fun/docs/sdks"
Issues = "https://github.com/edge-base/edgebase/issues"

[project.optional-dependencies]
keyring = ["keyring>=25.0"]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.sdist]
include = ["src/edgebase", "README.md", "llms.txt"]

[tool.hatch.build.targets.wheel]
packages = ["src/edgebase"]

[tool.hatch.build.targets.wheel.force-include]
"llms.txt" = "edgebase/llms.txt"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100
