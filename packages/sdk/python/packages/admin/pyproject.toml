[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "edgebase-admin"
version = "0.2.3"
description = "Python admin SDK for EdgeBase service-key workloads"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "EdgeBase Team" }
]
dependencies = ["edgebase-core>=0.2.3,<0.3.0"]

[project.urls]
Homepage = "https://github.com/edge-base/edgebase/tree/main/packages/sdk/python/packages/admin"
Repository = "https://github.com/edge-base/edgebase/tree/main/packages/sdk/python/packages/admin"
Documentation = "https://edgebase.fun/docs/admin-sdk/reference"
Issues = "https://github.com/edge-base/edgebase/issues"

[tool.hatch.build.targets.sdist]
include = ["src/edgebase_admin", "README.md", "llms.txt"]

[tool.hatch.build.targets.wheel]
packages = ["src/edgebase_admin"]

[tool.hatch.build.targets.wheel.force-include]
"llms.txt" = "edgebase_admin/llms.txt"
