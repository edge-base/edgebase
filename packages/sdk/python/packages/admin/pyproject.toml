[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "edgebase-admin"
version = "0.1.3"
description = "EdgeBase Admin SDK — admin auth, KV, D1, Vectorize."
requires-python = ">=3.9"
license = "MIT"
dependencies = ["edgebase-core>=0.1.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/edgebase_admin"]
