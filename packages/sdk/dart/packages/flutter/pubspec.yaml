name: edgebase_flutter
description: EdgeBase Flutter/Dart SDK — client-side auth, database-live, and more.
version: 0.1.0
homepage: https://github.com/melodysdreamj/edgebase
repository: https://github.com/melodysdreamj/edgebase/tree/main/packages/sdk/dart/packages/flutter

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  edgebase_core: ^0.1.0
  edgebase_admin: ^0.1.0
  http: ^1.2.0
  shared_preferences: ^2.2.0
  web_socket_channel: ^3.0.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  flutter_inappwebview: ^6.0.0

dependency_overrides:
  edgebase_core:
    path: ../core
  edgebase_admin:
    path: ../admin

dev_dependencies:
  test: ^1.24.0
  flutter_test:
    sdk: flutter
