<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect x="4" y="4" width="120" height="120" rx="28" fill="#0f172a" />
  <!-- 3D isometric prism with spectrum -->
  <!-- Front face -->
  <polygon points="48,24 72,80 24,80" fill="#6366f1" opacity="0.45" />
  <!-- Right face -->
  <polygon points="48,24 60,20 84,76 72,80" fill="#3b82f6" opacity="0.35" />
  <!-- Bottom face -->
  <polygon points="24,80 72,80 84,76 36,76" fill="#8b5cf6" opacity="0.3" />
  <!-- Edge highlights -->
  <line x1="48" y1="24" x2="60" y2="20" stroke="#93c5fd" stroke-width="1" opacity="0.5" />
  <line x1="48" y1="24" x2="72" y2="80" stroke="#a5b4fc" stroke-width="1" opacity="0.4" />
  <!-- Spectrum from right face -->
  <line x1="76" y1="38" x2="112" y2="22" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />
  <line x1="78" y1="48" x2="112" y2="40" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.85" />
  <line x1="80" y1="56" x2="112" y2="56" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
  <line x1="82" y1="64" x2="112" y2="72" stroke="#d946ef" stroke-width="2.5" stroke-linecap="round" opacity="0.85" />
  <line x1="82" y1="72" x2="112" y2="90" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />
  <!-- Input beam -->
  <line x1="14" y1="52" x2="38" y2="52" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5" />
</svg>
