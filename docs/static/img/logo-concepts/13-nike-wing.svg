<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EdgeBase Logo - Nike Wing">
  <defs>
    <linearGradient id="g13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="g13b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="#0f172a" />
  <!-- Goddess of Victory (Nike) inspired - figure with wing, arm pointing -->
  <!-- Head -->
  <circle cx="42" cy="30" r="10" fill="url(#g13)" />
  <!-- Helmet/crown detail -->
  <path d="M34,24 Q42,14 50,24" fill="none" stroke="url(#g13b)" stroke-width="2" stroke-linecap="round" />
  <!-- Body torso -->
  <path d="M36,40 Q34,44 36,56 L42,56 L48,56 Q50,44 48,40Z" fill="url(#g13)" />
  <!-- Flowing robe from waist -->
  <path d="M36,56 Q30,76 24,104 L42,104 Q42,82 42,72 Q42,82 42,104 L60,104 Q54,76 48,56Z" fill="url(#g13)" opacity="0.85" />
  <!-- Right arm pointing forward/up -->
  <path d="M48,44 Q62,36 78,30 Q90,26 100,22" fill="none" stroke="url(#g13)" stroke-width="3" stroke-linecap="round" />
  <!-- Hand/finger -->
  <path d="M100,22 L110,18" stroke="url(#g13)" stroke-width="2.5" stroke-linecap="round" />
  <!-- Wing sprouting from back - sweeping upward -->
  <path d="M36,42 Q28,34 20,20 Q26,22 34,28 Q30,18 28,10 Q34,16 38,26 Q36,14 38,8 Q40,16 40,30"
    fill="url(#g13b)" opacity="0.5" />
  <!-- Second wing layer -->
  <path d="M36,46 Q24,40 14,30 Q22,34 32,38"
    fill="none" stroke="url(#g13b)" stroke-width="1.5" opacity="0.4" />
  <!-- Sparkle at fingertip -->
  <circle cx="110" cy="18" r="2" fill="white" />
  <circle cx="110" cy="18" r="5" fill="#c084fc" opacity="0.3" />
  <!-- Speed lines -->
  <line x1="80" y1="28" x2="70" y2="32" stroke="#818cf8" stroke-width="1" opacity="0.3" />
  <line x1="90" y1="24" x2="80" y2="28" stroke="#818cf8" stroke-width="1" opacity="0.3" />
</svg>
