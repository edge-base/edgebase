<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g84" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="#0f172a" />
  <!-- Elegant orbital rings around a core -->
  <!-- Horizontal ellipse -->
  <ellipse cx="64" cy="64" rx="42" ry="16" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.7" />
  <!-- Tilted ellipse 1 -->
  <ellipse cx="64" cy="64" rx="42" ry="16" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.7" transform="rotate(60 64 64)" />
  <!-- Tilted ellipse 2 -->
  <ellipse cx="64" cy="64" rx="42" ry="16" fill="none" stroke="#ec4899" stroke-width="3" opacity="0.7" transform="rotate(-60 64 64)" />
  <!-- Core sphere -->
  <circle cx="64" cy="64" r="10" fill="url(#g84)" />
  <circle cx="61" cy="61" r="4" fill="white" opacity="0.2" />
</svg>
