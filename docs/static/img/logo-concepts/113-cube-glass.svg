  <!-- Edge bright lines for glass feel -->
  <polyline points="24,44 64,24 104,44" fill="none" stroke="white" stroke-width="0.7" opacity="0.25" />
  <polyline points="64,24 64,64" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" />
  <polyline points="24,44 24,84" fill="none" stroke="white" stroke-width="0.5" opacity="0.1" />
