    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="#0f172a" />
  <!-- Glass cube - translucent faces -->
  <polygon points="64,24 104,44 64,64 24,44" fill="url(#g113top)" opacity="0.85" />
  <polygon points="24,44 64,64 64,104 24,84" fill="url(#g113left)" opacity="0.6" />
