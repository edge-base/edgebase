name: Test Suite — Server + SDK E2E

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  EDGEBASE_SERVICE_KEY: test-service-key-for-admin
  SERVICE_KEY: test-service-key-for-admin
  BASE_URL: http://localhost:8688

jobs:
  # ─── 1. 서버 단위 테스트 (vitest-pool-workers) ─────────────────────────────
  server-unit:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/server

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build shared package
        run: pnpm --dir packages/shared build
        working-directory: .

      - name: Run server unit tests (src/__tests__)
        run: pnpm vitest run --config vitest.unit.config.ts --coverage

      - name: Run server integration tests (Miniflare)
        run: pnpm test:integration

  # ─── G2: Generated Code Drift Check ────────────────────────────────────────
  generated-code-check:
    name: Generated Code Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate SDK Core
        run: pnpm dlx tsx tools/sdk-codegen/generate.ts

      - name: Regenerate Smoke Tests
        run: pnpm dlx tsx tools/smoke-gen/generate-smoke.ts

      - name: Check for drift
        run: |
          mapfile -t GENERATED_PATHS < <(node tools/sdk-codegen/list-generated-paths.mjs)
          git diff --exit-code -- "${GENERATED_PATHS[@]}" || (echo "Generated code is out of date. Run generators and commit." && exit 1)

  # ─── 5. JS SDK 단위 테스트 ──────────────────────────────────────────────────
  sdk-js-unit:
    name: JS SDK Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + JS SDK packages
        run: |
          pnpm --dir packages/shared build
          pnpm --dir packages/sdk/js/packages/core build
          pnpm --dir packages/sdk/js/packages/web build
          pnpm --dir packages/sdk/js/packages/admin build
          pnpm --dir packages/sdk/js/packages/ssr build

      - name: JS core unit tests
        run: pnpm test
        working-directory: packages/sdk/js/packages/core

      - name: JS web unit tests
        run: pnpm test
        working-directory: packages/sdk/js/packages/web

      - name: JS admin unit tests
        run: pnpm test
        working-directory: packages/sdk/js/packages/admin

      # Smoke test — verify built entrypoints are valid JS, not .ts (catches packaging regressions)
      - name: SDK packaging smoke test
        shell: bash
        run: |
          set -e
          SDK_BASE="packages/sdk/js/packages"

          for pkg in core web admin ssr; do
            PKG_DIR="${SDK_BASE}/${pkg}"
            [ -f "$PKG_DIR/package.json" ] || continue

            # 1) main entrypoint file must exist
            MAIN=$(node -p "require('./${PKG_DIR}/package.json').main")
            if [ ! -f "$PKG_DIR/$MAIN" ]; then
              echo "FAIL: ${pkg} main '${MAIN}' not found"
              exit 1
            fi

            # 2) main must point to .js, not .ts
            case "$MAIN" in
              *.ts) echo "FAIL: ${pkg} main points to TypeScript source '${MAIN}'"; exit 1 ;;
            esac

            # 3) exports.".".import must also point to .js
            IMPORT=$(node -p "require('./${PKG_DIR}/package.json').exports['.'].import")
            case "$IMPORT" in
              *.ts) echo "FAIL: ${pkg} exports.import points to TypeScript source '${IMPORT}'"; exit 1 ;;
            esac

            # 4) entrypoint must be parseable as JS (syntax check)
            node --check "$PKG_DIR/$MAIN"

            echo "✓ ${pkg}: ${MAIN}"
          done
          echo "SDK packaging smoke test passed"

  # ─── 6. Kotlin SDK 단위 테스트 ──────────────────────────────────────────────
  sdk-kotlin-unit:
    name: Kotlin SDK Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Kotlin unit tests (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :core:test
        working-directory: packages/sdk/kotlin
      - name: Kotlin unit tests (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :core:test
        working-directory: packages/sdk/kotlin

  # ─── 7. Java SDK 단위 테스트 ────────────────────────────────────────────────
  sdk-java-unit:
    name: Java SDK Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Java unit tests
        run: gradle test
        working-directory: packages/sdk/java

  # ─── 8. Dart / Flutter SDK ──────────────────────────────────────────────────
  sdk-dart-unit:
    name: Dart SDK Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Dart core unit
        run: dart test test/core_unit_test.dart
        working-directory: packages/sdk/dart/packages/core
      - name: Dart flutter unit
        run: flutter test test/flutter_unit_test.dart
        working-directory: packages/sdk/dart/packages/flutter
      - name: Dart admin unit
        run: dart test test/admin_unit_test.dart
        working-directory: packages/sdk/dart/packages/admin

  # ─── 9. Rust SDK 단위 테스트 ────────────────────────────────────────────────
  sdk-rust-unit:
    name: Rust SDK Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust core unit tests
        run: cargo test --lib
        working-directory: packages/sdk/rust/packages/core
      - name: Rust admin unit tests
        run: cargo test --lib
        working-directory: packages/sdk/rust/packages/admin

  # ─── 10. C# SDK 단위 테스트 ─────────────────────────────────────────────────
  sdk-csharp-unit:
    name: C# SDK Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: C# unit tests
        run: dotnet test tests/ -v normal
        working-directory: packages/sdk/csharp

  # ─── 11. Go SDK 단위 테스트 ────────────────────────────────────────────────
  sdk-go-unit:
    name: Go SDK Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/sdk/go/go.mod
      - name: Go unit tests
        run: go test -tags unit -v ./...
        working-directory: packages/sdk/go

  # ─── 12. React Native SDK 단위 테스트 ──────────────────────────────────────
  sdk-react-native-unit:
    name: React Native SDK Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: React Native unit tests
        run: pnpm test
        working-directory: packages/sdk/react-native

  # ─── 12.5. JS SDK E2E ───────────────────────────────────────────────────────
  sdk-js-e2e:
    name: JS SDK E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start EdgeBase test server and run JS SDK E2E
        run: node ./scripts/run-with-services.mjs --server --mock-fcm --cwd packages/sdk/js -- pnpm run test:e2e

  # ─── 13. Go SDK E2E ─────────────────────────────────────────────────────────
  sdk-go-e2e:
    name: Go SDK E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/sdk/go/go.mod
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start EdgeBase test server and run Go E2E
        run: node ./scripts/run-with-services.mjs --server --cwd packages/sdk/go -- go test -tags e2e -v ./...

  # ─── 14. Python SDK E2E ─────────────────────────────────────────────────────
  sdk-python-e2e:
    name: Python SDK E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Python SDK dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e './packages/sdk/python/packages/core'
          pip install -e './packages/sdk/python/packages/admin'
          pip install -e './packages/sdk/python[dev]' --no-deps
      - name: Start EdgeBase test server and run Python E2E
        run: node ./scripts/run-with-services.mjs --server -- pytest packages/sdk/python/packages/core/tests/test_core_e2e.py packages/sdk/python/packages/admin/tests/test_admin_e2e.py

  # ─── 15. React Native SDK E2E ───────────────────────────────────────────────
  sdk-react-native-e2e:
    name: React Native SDK E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
      MOCK_FCM_PORT: '9099'
      MOCK_FCM_BASE_URL: http://localhost:9099
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start EdgeBase test server and run React Native E2E
        run: node ./scripts/run-with-services.mjs --server --mock-fcm --cwd packages/sdk/react-native -- pnpm test:e2e

  # ─── 16. Swift SDK E2E ──────────────────────────────────────────────────────
  sdk-swift-e2e:
    name: Swift SDK E2E
    runs-on: macos-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
      EDGEBASE_TEST_LOG_PATH: /tmp/edgebase-swift-e2e-server.log
      EDGEBASE_TEST_PID_PATH: /tmp/edgebase-swift-e2e-server.pid
      EDGEBASE_E2E_HEALTHCHECK_TIMEOUT_MS: '15000'
      EDGEBASE_E2E_HEALTHCHECK_RETRIES: '3'
      EDGEBASE_E2E_HEALTHCHECK_RETRY_DELAY_MS: '1000'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start EdgeBase test server and run Swift E2E
        run: |
          bash ./scripts/run-with-pty.sh <<'EOF'
          set -euo pipefail
          cleanup() {
            status=$?
            if [[ -f "$EDGEBASE_TEST_PID_PATH" ]]; then
              PID="$(cat "$EDGEBASE_TEST_PID_PATH")"
              kill "$PID" 2>/dev/null || true
              pkill -P "$PID" 2>/dev/null || true
            fi
            if [[ $status -ne 0 && -f "$EDGEBASE_TEST_LOG_PATH" ]]; then
              tail -n 200 "$EDGEBASE_TEST_LOG_PATH" || true
            fi
            exit "$status"
          }
          trap cleanup EXIT
          ROOT_DIR="$(pwd)"
          run_swift_suite() {
            bash "$ROOT_DIR/scripts/wait-for-test-server.sh"
            swift test --filter "$1"
          }
          bash ./scripts/start-test-server.sh
          bash ./scripts/wait-for-test-server.sh
          cd packages/sdk/swift/packages/core
          run_swift_suite E2ETests
          cd ../ios
          run_swift_suite EdgeBaseClientIosE2ETests
          run_swift_suite IosAuthExtendedE2ETests
          run_swift_suite IosDbExtendedE2ETests
          run_swift_suite IosStorageAuthE2ETests
          run_swift_suite IosRoomE2ETests
          run_swift_suite IosSwiftLangE2ETests
          EOF

  # ─── 17. Java SDK E2E ───────────────────────────────────────────────────────
  sdk-java-e2e:
    name: Java SDK E2E
    runs-on: ubuntu-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start EdgeBase test server and run Java E2E
        run: |
          node ./scripts/run-with-services.mjs --server --mock-fcm --cwd packages/sdk/java -- \
            gradle \
            test --tests io.edgebase.sdk.JavaE2ETest \
            :packages:core:test --tests dev.edgebase.sdk.core.CoreE2ETest \
            :packages:admin:test --tests dev.edgebase.sdk.admin.AdminE2ETest \
            :packages:android:test --tests dev.edgebase.sdk.client.AndroidE2ETest

  # ─── 18. Kotlin SDK E2E ─────────────────────────────────────────────────────
  sdk-kotlin-e2e:
    name: Kotlin SDK E2E
    runs-on: ubuntu-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start EdgeBase test server and run Kotlin E2E
        run: |
          node ./scripts/run-with-services.mjs --server --mock-fcm --cwd packages/sdk/kotlin -- \
            bash -lc './gradlew \
              :core:testDebugUnitTest --tests io.edgebase.sdk.KotlinE2ETest \
              :client:jvmTest --tests dev.edgebase.sdk.client.ClientEdgeBaseJvmAuthE2ETest \
              :client:testDebugUnitTest --tests dev.edgebase.sdk.client.ClientEdgeBaseE2ETest \
              :admin:test --tests dev.edgebase.sdk.admin.AdminEdgeBaseE2ETest'

  # ─── 19. Dart SDK E2E ───────────────────────────────────────────────────────
  sdk-dart-e2e:
    name: Dart SDK E2E
    runs-on: ubuntu-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start EdgeBase test server and run Dart E2E
        run: |
          node ./scripts/run-with-services.mjs --server --mock-fcm -- \
            bash -lc 'set -euo pipefail
              cd packages/sdk/dart/packages/core
              dart test test/core_e2e_test.dart -r expanded
              cd ../admin
              dart test test/admin_e2e_test.dart -r expanded
              cd ../flutter
              dart test test/flutter_e2e_test.dart -r expanded'

  # ─── 20. Rust SDK E2E ───────────────────────────────────────────────────────
  sdk-rust-e2e:
    name: Rust SDK E2E
    runs-on: ubuntu-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start EdgeBase test server and run Rust E2E
        run: |
          node ./scripts/run-with-services.mjs --server --mock-fcm --cwd packages/sdk/rust -- \
            bash -lc 'set -euo pipefail
              cargo test --test e2e -- --nocapture
              cargo test --test e2e_room -- --nocapture'

  # ─── 21. C# SDK E2E ─────────────────────────────────────────────────────────
  sdk-csharp-e2e:
    name: C# SDK E2E
    runs-on: ubuntu-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start EdgeBase test server and run C# E2E
        run: |
          node ./scripts/run-with-services.mjs --server --mock-fcm -- \
            bash -lc 'set -euo pipefail
              dotnet test packages/sdk/csharp/packages/admin/tests/EdgeBase.Admin.Tests.csproj --filter "FullyQualifiedName~E2E" -v normal
              dotnet test packages/sdk/csharp/packages/unity/tests/EdgeBase.Unity.Tests.csproj --filter "FullyQualifiedName~E2E" -v normal'

  # ─── 22. PHP SDK E2E ────────────────────────────────────────────────────────
  sdk-php-e2e:
    name: PHP SDK E2E
    runs-on: ubuntu-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: curl, json
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install PHP SDK dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: packages/sdk/php
      - name: Start EdgeBase test server and run PHP E2E
        run: |
          node ./scripts/run-with-services.mjs --server --mock-fcm --cwd packages/sdk/php -- \
            vendor/bin/phpunit --colors=always

  # ─── 23. Elixir SDK E2E ─────────────────────────────────────────────────────
  sdk-elixir-e2e:
    name: Elixir SDK E2E
    runs-on: ubuntu-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17.3'
          otp-version: '27.1'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare Elixir tooling
        run: |
          mix local.hex --force
          mix local.rebar --force
      - name: Start EdgeBase test server and run Elixir E2E
        run: |
          node ./scripts/run-with-services.mjs --server -- \
            bash -lc 'set -euo pipefail
              cd packages/sdk/elixir/packages/core
              mix deps.get
              mix test
              cd ../admin
              mix deps.get
              mix test'

  # ─── 24. Scala SDK E2E ──────────────────────────────────────────────────────
  sdk-scala-e2e:
    name: Scala SDK E2E
    runs-on: ubuntu-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Java SDK jars required by Scala tests
        run: gradle :packages:core:jar :packages:admin:jar
        working-directory: packages/sdk/java
      - name: Start EdgeBase test server and run Scala E2E
        run: |
          node ./scripts/run-with-services.mjs --server --cwd packages/sdk/scala -- \
            gradle test

  # ─── 25. Ruby SDK E2E ───────────────────────────────────────────────────────
  sdk-ruby-e2e:
    name: Ruby SDK E2E
    runs-on: ubuntu-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start EdgeBase test server and run Ruby E2E
        run: |
          node ./scripts/run-with-services.mjs --server -- \
            bash -lc 'set -euo pipefail
              cd packages/sdk/ruby/packages/core
              ruby -Ilib -Itest test/test_core_unit.rb
              cd ../admin
              ruby -Ilib -I../core/lib -Itest test/test_admin_unit.rb
              ruby -Ilib -I../core/lib -Itest test/test_admin_e2e.rb'

  # ─── 26. C++ SDK E2E ────────────────────────────────────────────────────────
  sdk-cpp-e2e:
    name: C++ SDK E2E
    runs-on: ubuntu-latest
    needs: [server-unit]
    env:
      EDGEBASE_E2E_REQUIRED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev ninja-build
      - name: Start EdgeBase test server and run C++ E2E
        run: |
          node ./scripts/run-with-services.mjs --server --mock-fcm -- \
            bash -lc 'set -euo pipefail
              CORE_BUILD_DIR="${RUNNER_TEMP}/edgebase-cpp-core-build"
              UNREAL_BUILD_DIR="${RUNNER_TEMP}/edgebase-cpp-unreal-build"
              cmake -S packages/sdk/cpp/packages/core/tests -B "$CORE_BUILD_DIR" -G Ninja
              cmake --build "$CORE_BUILD_DIR" --parallel
              "$CORE_BUILD_DIR/unit_test"
              "$CORE_BUILD_DIR/e2e_test"
              cmake -S packages/sdk/cpp/packages/unreal -B "$UNREAL_BUILD_DIR" -G Ninja
              cmake --build "$UNREAL_BUILD_DIR" --parallel
              "$UNREAL_BUILD_DIR/unit_test"
              "$UNREAL_BUILD_DIR/e2e_test"'

  # ─── Role Contract Catalog ──────────────────────────────────────────────────
  sdk-role-contract-catalog:
    name: SDK Role Contract Catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Verify role contract catalog
        run: node ./scripts/sdk-role-contracts.mjs verify

  # ─── Role Contract Gates ───────────────────────────────────────────────────
  sdk-admin-contract:
    name: SDK Admin Contract
    runs-on: ubuntu-latest
    if: always()
    needs:
      - sdk-role-contract-catalog
      - sdk-go-e2e
      - sdk-js-e2e
      - sdk-python-e2e
      - sdk-java-e2e
      - sdk-kotlin-e2e
      - sdk-dart-e2e
      - sdk-rust-e2e
      - sdk-csharp-e2e
      - sdk-php-e2e
      - sdk-elixir-e2e
      - sdk-scala-e2e
      - sdk-ruby-e2e
    steps:
      - name: Enforce admin contract coverage
        run: |
          results=(
            "${{ needs.sdk-role-contract-catalog.result }}"
            "${{ needs.sdk-go-e2e.result }}"
            "${{ needs.sdk-js-e2e.result }}"
            "${{ needs.sdk-python-e2e.result }}"
            "${{ needs.sdk-java-e2e.result }}"
            "${{ needs.sdk-kotlin-e2e.result }}"
            "${{ needs.sdk-dart-e2e.result }}"
            "${{ needs.sdk-rust-e2e.result }}"
            "${{ needs.sdk-csharp-e2e.result }}"
            "${{ needs.sdk-php-e2e.result }}"
            "${{ needs.sdk-elixir-e2e.result }}"
            "${{ needs.sdk-scala-e2e.result }}"
            "${{ needs.sdk-ruby-e2e.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" ]]; then
              echo "admin contract dependency failed: $result"
              exit 1
            fi
          done

  sdk-core-contract:
    name: SDK Core Contract
    runs-on: ubuntu-latest
    if: always()
