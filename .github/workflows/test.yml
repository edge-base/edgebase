  # ─── Mutation Testing (PR only) ─────────────────────────────────────────────
  mutation-test:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: packages/server

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Get changed lib files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }} -- 'packages/server/src/lib/**/*.ts' | sed 's|packages/server/||' | tr '\n' ',' | sed 's/,$//')
          echo "files=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Changed files: ${CHANGED}"

      - name: Run Stryker mutation tests
        if: steps.changed.outputs.files != ''
        run: pnpm exec stryker run --mutate "${{ steps.changed.outputs.files }}"

      - name: Skip mutation (no lib changes)
        if: steps.changed.outputs.files == ''
        run: echo "No lib files changed, skipping mutation testing"

  # ─── Performance Regression (PR only) ──────────────────────────────────────
  bench:
    name: Performance Regression
    runs-on: ubuntu-latest
    needs: [server-unit]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: packages/server

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build shared package
        run: pnpm --dir packages/shared build
        working-directory: .

      - name: Run benchmarks
        run: pnpm vitest bench --config vitest.bench.config.ts --reporter=json > bench-results.json 2>/dev/null || true

      - name: Check for regressions
        run: node ../../tools/bench-check.js bench-results.json

  # ─── OpenAPI Spec Stability ────────────────────────────────────────────────
  openapi-check:
    name: OpenAPI Spec Check
    runs-on: ubuntu-latest
    needs: [server-unit]
    defaults:
      run:
        working-directory: packages/server

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build shared package
        run: pnpm --dir packages/shared build
        working-directory: .

      - name: Run OpenAPI spec tests
        run: pnpm vitest run --config vitest.integration.config.ts test/integration/openapi-spec.test.ts

  # ─── Summary ────────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    needs:
      - server-unit
      - openapi-check
      - sdk-js-unit
      - sdk-kotlin-unit
      - sdk-java-unit
      - sdk-dart-unit
      - sdk-rust-unit
      - sdk-csharp-unit
      - sdk-go-unit
      - sdk-react-native-unit
      - sdk-js-e2e
      - sdk-java-e2e
      - sdk-kotlin-e2e
      - sdk-dart-e2e
      - sdk-go-e2e
      - sdk-python-e2e
      - sdk-rust-e2e
      - sdk-csharp-e2e
      - sdk-react-native-e2e
      - sdk-swift-e2e
      - sdk-php-e2e
      - sdk-elixir-e2e
      - sdk-scala-e2e
      - sdk-ruby-e2e
      - sdk-cpp-e2e
      - sdk-role-contract-catalog
      - sdk-admin-contract
      - sdk-core-contract
      - sdk-client-contract
      - sdk-client-auth-verify-contract
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report
        run: |
          echo "=== Test Summary ==="
          echo "Server Unit: ${{ needs.server-unit.result }}"
          echo "OpenAPI Check: ${{ needs.openapi-check.result }}"
          echo "JS SDK Unit: ${{ needs.sdk-js-unit.result }}"
          echo "Kotlin Unit: ${{ needs.sdk-kotlin-unit.result }}"
          echo "Java Unit: ${{ needs.sdk-java-unit.result }}"
          echo "Dart Unit: ${{ needs.sdk-dart-unit.result }}"
          echo "Rust Unit: ${{ needs.sdk-rust-unit.result }}"
          echo "C# Unit: ${{ needs.sdk-csharp-unit.result }}"
          echo "Go Unit: ${{ needs.sdk-go-unit.result }}"
          echo "React Native Unit: ${{ needs.sdk-react-native-unit.result }}"
          echo "JS SDK E2E: ${{ needs.sdk-js-e2e.result }}"
          echo "Java E2E: ${{ needs.sdk-java-e2e.result }}"
          echo "Kotlin E2E: ${{ needs.sdk-kotlin-e2e.result }}"
          echo "Dart E2E: ${{ needs.sdk-dart-e2e.result }}"
          echo "Go E2E: ${{ needs.sdk-go-e2e.result }}"
          echo "Python E2E: ${{ needs.sdk-python-e2e.result }}"
          echo "Rust E2E: ${{ needs.sdk-rust-e2e.result }}"
          echo "C# E2E: ${{ needs.sdk-csharp-e2e.result }}"
          echo "React Native E2E: ${{ needs.sdk-react-native-e2e.result }}"
          echo "Swift E2E: ${{ needs.sdk-swift-e2e.result }}"
          echo "PHP E2E: ${{ needs.sdk-php-e2e.result }}"
