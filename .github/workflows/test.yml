      - sdk-dart-e2e
      - sdk-rust-e2e
      - sdk-php-e2e
      - sdk-swift-e2e
      - sdk-cpp-e2e
    steps:
      - name: Enforce core contract coverage
        run: |
          results=(
            "${{ needs.sdk-role-contract-catalog.result }}"
            "${{ needs.sdk-go-e2e.result }}"
            "${{ needs.sdk-js-e2e.result }}"
