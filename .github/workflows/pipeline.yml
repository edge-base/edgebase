name: Pipeline

on:
  pull_request:
    # Intentionally limited to final PRs targeting protected branches.
    # Stacked PRs against intermediate codex/* branches may therefore show
    # GitHub's CodeQL code-scanning check as neutral/no-result, which is expected.
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  test:
    name: Test Suite — Server + SDK E2E
    uses: ./.github/workflows/test.yml
    secrets: inherit

  semgrep:
    name: Semgrep
    uses: ./.github/workflows/semgrep.yml
    secrets: inherit

  codeql:
    name: CodeQL
    uses: ./.github/workflows/codeql.yml
    secrets: inherit
