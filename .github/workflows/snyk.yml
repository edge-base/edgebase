name: Snyk

on:
  workflow_call:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:

concurrency:
  group: snyk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snyk-code:
    name: Code Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_REMOTE_REPO_URL: https://github.com/${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Snyk token
        id: token
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Snyk skipped::Add the SNYK_TOKEN repository secret to enable Snyk scans."
          fi

      - name: Skip Snyk Code when token is unavailable
        if: steps.token.outputs.configured != 'true'
        run: |
          echo "::notice title=Snyk skipped::SNYK_TOKEN is not configured, so Snyk Code is being skipped."

      - name: Select Snyk severity threshold
        id: threshold
        if: steps.token.outputs.configured == 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=high" >> "$GITHUB_OUTPUT"
          else
            echo "value=medium" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Snyk CLI
        if: steps.token.outputs.configured == 'true'
        uses: snyk/actions/setup@master

      - name: Run Snyk Code
        id: code_scan
        if: steps.token.outputs.configured == 'true'
        shell: bash
        run: |
          set +e
          snyk code test \
            --severity-threshold="${{ steps.threshold.outputs.value }}" \
            --remote-repo-url="$SNYK_REMOTE_REPO_URL" \
            --sarif-file-output=snyk-code.sarif \
            > >(tee snyk-code.log) 2> >(tee -a snyk-code.log >&2)
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Classify Snyk Code result
        id: code_result
        if: steps.token.outputs.configured == 'true'
        shell: bash
        run: |
          status="${{ steps.code_scan.outputs.exit_code }}"
          outcome="error"
          reason="unexpected-error"

          if [ "$status" = "0" ]; then
            outcome="pass"
            reason="clean"
          elif [ "$status" = "1" ]; then
            outcome="finding"
            reason="vulnerabilities-found"
          elif [ "$status" = "3" ]; then
            outcome="skip"
            reason="no-supported-projects"
          elif grep -Eiq 'SNYK-CODE-0005|snyk code is not enabled|not supported for your current organization|activate snyk code' snyk-code.log; then
            outcome="skip"
            reason="code-not-enabled"
          elif grep -Eiq 'test limit|rate limit|too many requests|quota|payment required|unauthorized|forbidden|authentication failed|failed to authenticate|access denied|service unavailable|temporarily unavailable|organization .* not found' snyk-code.log; then
            outcome="skip"
            reason="platform-or-access-rejection"
          fi

          echo "outcome=$outcome" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Upload Snyk Code SARIF
        id: code_upload
        continue-on-error: true
        if: steps.token.outputs.configured == 'true' && always() && hashFiles('snyk-code.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Warn when Snyk Code SARIF upload fails
        if: steps.token.outputs.configured == 'true' && always() && steps.code_upload.outcome == 'failure'
        run: echo "::warning title=Snyk Code SARIF upload failed::The Snyk Code scan ran, but GitHub code scanning could not ingest the SARIF upload. Review the upload step log for details."

      - name: Report skipped Snyk Code scan
        if: steps.token.outputs.configured == 'true' && steps.code_result.outputs.outcome == 'skip'
        run: echo "::notice title=Snyk Code skipped::Snyk Code was skipped because Snyk rejected the scan (${{
          steps.code_result.outputs.reason }})."

      - name: Report Snyk Code findings
        if: steps.token.outputs.configured == 'true' && github.event_name != 'pull_request' && steps.code_result.outputs.outcome == 'finding'
        run: echo "::warning title=Snyk Code reported findings::Review the uploaded SARIF results in GitHub Security."

      - name: Warn on unexpected Snyk Code errors
        if: steps.token.outputs.configured == 'true' && github.event_name != 'pull_request' && steps.code_result.outputs.outcome == 'error'
        run: echo "::warning title=Snyk Code scan failed::Snyk Code did not complete cleanly. Review the job log for details."

      - name: Block PR on Snyk Code findings
        if: steps.token.outputs.configured == 'true' && github.event_name == 'pull_request' && steps.code_result.outputs.outcome == 'finding'
        run: |
          echo "Snyk Code found high-severity issues."
          exit 1

      - name: Fail PR on unexpected Snyk Code errors
        if: steps.token.outputs.configured == 'true' && github.event_name == 'pull_request' && steps.code_result.outputs.outcome == 'error'
        run: |
          echo "Snyk Code failed unexpectedly. Review the job log for details."
          exit 1

  snyk-open-source:
    name: Open Source Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_REMOTE_REPO_URL: https://github.com/${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Snyk token
        id: token
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Snyk skipped::Add the SNYK_TOKEN repository secret to enable Snyk dependency scans."
          fi

      - name: Skip Snyk dependency scan when token is unavailable
        if: steps.token.outputs.configured != 'true'
        run: |
          echo "::notice title=Snyk skipped::SNYK_TOKEN is not configured, so the Snyk dependency scan is being skipped."

      - name: Select Snyk severity threshold
        id: threshold
        if: steps.token.outputs.configured == 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=high" >> "$GITHUB_OUTPUT"
          else
            echo "value=medium" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Snyk CLI
        if: steps.token.outputs.configured == 'true'
        uses: snyk/actions/setup@master

      - name: Set up pnpm
        if: steps.token.outputs.configured == 'true'
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        if: steps.token.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Set up Python
        if: steps.token.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Go
        if: steps.token.outputs.configured == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/sdk/go/go.mod

      - name: Set up Java
        if: steps.token.outputs.configured == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        if: steps.token.outputs.configured == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Set up .NET
        if: steps.token.outputs.configured == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Rust
        if: steps.token.outputs.configured == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore .NET package graphs
        if: steps.token.outputs.configured == 'true'
        working-directory: packages/sdk/csharp
        run: |
          dotnet restore src/EdgeBase.csproj
          dotnet restore packages/admin/EdgeBase.Admin.csproj
          dotnet restore packages/unity/EdgeBase.Unity.csproj
          dotnet restore tests/EdgeBase.Tests.csproj
          dotnet restore packages/unity/tests/EdgeBase.Unity.Tests.csproj

      - name: Run Snyk Open Source
        id: oss_scan
        if: steps.token.outputs.configured == 'true'
        shell: bash
        run: |
          set +e
          snyk test \
            --all-projects \
            --detection-depth=6 \
            --exclude=dev,node_modules,vendor,build,.build,dist,coverage,target,bin,obj,artifacts,.dart_tool \
            --prune-repeated-subdependencies \
            --remote-repo-url="$SNYK_REMOTE_REPO_URL" \
            --severity-threshold="${{ steps.threshold.outputs.value }}" \
            --sarif-file-output=snyk-open-source.sarif \
            > >(tee snyk-open-source.log) 2> >(tee -a snyk-open-source.log >&2)
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Classify Snyk dependency result
        id: oss_result
        if: steps.token.outputs.configured == 'true'
        shell: bash
        run: |
          status="${{ steps.oss_scan.outputs.exit_code }}"
          outcome="error"
          reason="unexpected-error"

          if [ "$status" = "0" ]; then
            outcome="pass"
            reason="clean"
          elif [ "$status" = "1" ]; then
            outcome="finding"
            reason="vulnerabilities-found"
          elif [ "$status" = "3" ]; then
            outcome="skip"
            reason="no-supported-projects"
          elif grep -Eiq 'test limit|rate limit|too many requests|quota|payment required|unauthorized|forbidden|authentication failed|failed to authenticate|access denied|service unavailable|temporarily unavailable|organization .* not found' snyk-open-source.log; then
            outcome="skip"
            reason="platform-or-access-rejection"
          fi

          echo "outcome=$outcome" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Check Snyk Open Source SARIF run count
        id: oss_sarif
        if: steps.token.outputs.configured == 'true' && always() && hashFiles('snyk-open-source.sarif') != ''
        shell: bash
        run: |
          runs=$(jq '.runs | length' snyk-open-source.sarif)
          echo "runs=$runs" >> "$GITHUB_OUTPUT"

          if [ "$runs" -le 20 ]; then
            echo "uploadable=true" >> "$GITHUB_OUTPUT"
          else
            echo "uploadable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Snyk Open Source SARIF
        id: oss_upload
        continue-on-error: true
        if: steps.token.outputs.configured == 'true' && always() && hashFiles('snyk-open-source.sarif') != '' && steps.oss_sarif.outputs.uploadable == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-open-source.sarif
          category: snyk-open-source

      - name: Report skipped Snyk Open Source SARIF upload
        if: steps.token.outputs.configured == 'true' && always() && steps.oss_sarif.outputs.uploadable == 'false'
        run: echo "::notice title=Snyk SARIF upload skipped::GitHub code scanning accepts up to 20 SARIF runs per upload, but Snyk produced ${{
          steps.oss_sarif.outputs.runs }}. The dependency scan still ran and the job result reflects the scan outcome."

      - name: Warn when Snyk Open Source SARIF upload fails
        if: steps.token.outputs.configured == 'true' && always() && steps.oss_upload.outcome == 'failure'
        run: echo "::warning title=Snyk Open Source SARIF upload failed::The Snyk dependency scan ran, but GitHub code scanning could not ingest the SARIF upload. Review the upload step log for details."

      - name: Report skipped Snyk dependency scan
        if: steps.token.outputs.configured == 'true' && steps.oss_result.outputs.outcome == 'skip'
        run: echo "::notice title=Snyk dependency scan skipped::Snyk Open Source was skipped because Snyk rejected the scan (${{
          steps.oss_result.outputs.reason }})."

      - name: Report Snyk dependency findings
        if: steps.token.outputs.configured == 'true' && github.event_name != 'pull_request' && steps.oss_result.outputs.outcome == 'finding'
        run: echo "::warning title=Snyk dependency scan reported findings::Review the uploaded SARIF results in GitHub Security."

      - name: Warn on unexpected Snyk dependency errors
        if: steps.token.outputs.configured == 'true' && github.event_name != 'pull_request' && steps.oss_result.outputs.outcome == 'error'
        run: echo "::warning title=Snyk dependency scan failed::Snyk Open Source did not complete cleanly. Review the job log for details."

      - name: Block PR on Snyk dependency findings
        if: steps.token.outputs.configured == 'true' && github.event_name == 'pull_request' && steps.oss_result.outputs.outcome == 'finding'
        run: |
          echo "Snyk Open Source found high-severity issues."
          exit 1

      - name: Fail PR on unexpected Snyk dependency errors
        if: steps.token.outputs.configured == 'true' && github.event_name == 'pull_request' && steps.oss_result.outputs.outcome == 'error'
        run: |
          echo "Snyk Open Source failed unexpectedly. Review the job log for details."
          exit 1
