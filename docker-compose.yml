services:
  edgebase:
    build: .
    container_name: edgebase
    ports:
      - "${PORT:-8787}:8787"
    volumes:
      - edgebase-data:/data
    environment:
      - PORT=8787
      - HOST=0.0.0.0
      - PERSIST_DIR=/data
      # Workers Secrets → environment variables
      # - JWT_USER_SECRET=your-jwt-secret-here
      # - SERVICE_KEY=your-service-key-here
      # - JWT_ADMIN_SECRET=your-admin-jwt-secret-here
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "const http=require('http');const r=http.get('http://localhost:'+process.env.PORT+'/api/health',s=>{process.exit(s.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.setTimeout(3000,()=>process.exit(1));" ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  edgebase-data:
    driver: local
